<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NeuralChat Logo</title>
  <desc id="desc">A stylized neural network mark with flowing connections and accent nodes.</desc>
  <defs>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 128) rotate(90) scale(128)">
      <stop offset="0" stop-color="#EEEAFE"/>
      <stop offset="0.62" stop-color="#F7F6FF" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="surface" x1="48" y1="36" x2="208" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F3FF"/>
    </linearGradient>
    <linearGradient id="edge" x1="62" y1="56" x2="190" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6E66D9" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#8FD0FF" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="shadow" x="18" y="18" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#7F77DD" flood-opacity="0.18"/>
    </filter>
    <filter id="coreGlow" x="88" y="52" width="80" height="150" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#7F77DD" flood-opacity="0.42"/>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="118" fill="url(#halo)"/>
  <g filter="url(#shadow)">
    <rect x="36" y="36" width="184" height="184" rx="92" fill="url(#surface)" stroke="#D6D9F4" stroke-width="2"/>
  </g>

  <g transform="translate(38 38) scale(5)" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="url(#edge)" stroke-width="1.15">
      <line x1="5" y1="9" x2="16" y2="5" stroke-opacity="0.52"/>
      <line x1="5" y1="9" x2="16" y2="18" stroke-opacity="0.56"/>
      <line x1="5" y1="9" x2="16" y2="31" stroke-opacity="0.32"/>
      <line x1="5" y1="27" x2="16" y2="5" stroke-opacity="0.28"/>
      <line x1="5" y1="27" x2="16" y2="18" stroke-opacity="0.54"/>
      <line x1="5" y1="27" x2="16" y2="31" stroke-opacity="0.52"/>
      <line x1="16" y1="5" x2="31" y2="12" stroke-opacity="0.56"/>
      <line x1="16" y1="5" x2="31" y2="24" stroke-opacity="0.3"/>
      <line x1="16" y1="18" x2="31" y2="12" stroke-opacity="0.68"/>
      <line x1="16" y1="18" x2="31" y2="24" stroke-opacity="0.68"/>
      <line x1="16" y1="31" x2="31" y2="12" stroke-opacity="0.3"/>
      <line x1="16" y1="31" x2="31" y2="24" stroke-opacity="0.54"/>
    </g>

    <g fill="#4D5E8C">
      <circle cx="5" cy="9" r="2.8" fill-opacity="0.8"/>
      <circle cx="5" cy="27" r="2.8" fill-opacity="0.8"/>
      <circle cx="31" cy="12" r="2.8"/>
      <circle cx="31" cy="24" r="2.8"/>
    </g>

    <g filter="url(#coreGlow)">
      <circle cx="16" cy="5" r="2.8" fill="#7F77DD"/>
      <circle cx="16" cy="18" r="3.4" fill="#7F77DD"/>
      <circle cx="16" cy="31" r="2.8" fill="#7F77DD"/>
    </g>
  </g>
</svg>
